# ============================================
# Cloudflare Workers 配置文件
# 項目: Flux AI Pro - NanoBanana Edition
# 版本: 11.0.0 (KV Online Count & History Fix)
# 更新: 2026-01-16
# ============================================

name = "vggcaa"
main = "worker.js"
compatibility_date = "2024-12-01"

# ============================================
# KV 存儲綁定 (NanoBanana 限流必需)
# ⚠️ 請執行: npx wrangler kv:namespace create "FLUX_KV"
# 然後將生成的 id 填入下方
# ============================================
[[kv_namespaces]]
binding = "FLUX_KV"
id = "60c3308b4f8e431e879350fae8d7a791"

# ============================================
# Workers AI 綁定（用於中文自動翻譯）
# ============================================
[ai]
binding = "AI"

# ============================================
# 環境變量（非敏感）
# ============================================
[vars]
WORKER_VERSION = "11.0.0"
DEFAULT_MODEL = "flux"
MAX_WIDTH = 2048
MAX_HEIGHT = 2048
MAX_TIMEOUT = 120000
ENVIRONMENT = "production"

# ============================================
# Secrets 通過 wrangler secret 命令設置
# 🔐 推薦設置:
# 1. POLLINATIONS_API_KEY (Pollinations)
# 2. INFIP_API_KEY (Ghostbot/Infip)
# ============================================
# 設置命令範例：
# npx wrangler secret put POLLINATIONS_API_KEY
# npx wrangler secret put INFIP_API_KEY

